name: Refresh Token & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Zoho access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.eu/oauth/v2/token" \
            --data-urlencode "refresh_token=${{ secrets.ZOHO_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            --data-urlencode "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            --data-urlencode "grant_type=refresh_token")
          echo "Response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
          echo "access_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Inject token into HTML
        run: |
          sed -i "s|__ACCESS_TOKEN__|${{ steps.token.outputs.access_token }}|g" index.html
          echo "Token injected successfully"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
